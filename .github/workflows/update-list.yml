name: Update Disposable Email List

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Process Lists
        run: |
          TEMP_FILE="temp_raw_list.txt"
          OUTPUT_FILE="domains.txt"

          # 1. Process Text and JSON URLs
          URLS=(
              "https://disposable.github.io/disposable-email-domains/domains.txt"
              "https://raw.githubusercontent.com/disposable-email-domains/disposable-email-domains/main/disposable_email_blocklist.conf"
              "https://raw.githubusercontent.com/7c/fakefilter/main/txt/data.txt"
              "https://raw.githubusercontent.com/wesbos/burner-email-providers/master/emails.txt"
              "https://raw.githubusercontent.com/Propaganistas/Laravel-Disposable-Email/refs/heads/master/domains.json"
              "https://deviceandbrowserinfo.com/api/emails/disposable"
          )

          for url in "${URLS[@]}"; do
              # Download, remove JSON chars, remove carriage returns
              curl -sL "$url" | sed 's/[\[\]" ,]//g' | tr -d '\r' >> "$TEMP_FILE"
          done

          # 2. Advanced Clean: 
          # - grep: Only keep lines that look like domains (contain a dot, no start-hashes)
          # - awk: Ensure length is greater than 3 (ignores '.', ':', etc)
          # - sed: lowercase everything
          grep -E '^([a-z0-9]+(-[a-z0-9]+)*\.)+[a-z]{2,}$' "$TEMP_FILE" | \
          awk 'length($0) > 3' | \
          sort -u > "$OUTPUT_FILE"

          # 3. Stats for README
          DOMAIN_COUNT=$(wc -l < "$OUTPUT_FILE" | xargs)
          # Use a simpler date format (no colons) for the badge to avoid sed issues
          LAST_UPDATED=$(date -u +'%Y--%m--%d') 
          
          # Use | as a delimiter in sed instead of / to avoid path/date conflicts
          sed -i "s/count-[0-9]*-blue/count-$DOMAIN_COUNT-blue/g" README.md
          sed -i "s/updated-[^ ]*-green/updated-$LAST_UPDATED-green/g" README.md

          rm "$TEMP_FILE"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add domains.txt README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: $(date -u)" && git push)
